<style>
  :host {
    --bright-blue: oklch(51.01% 0.274 263.83);
    --electric-violet: oklch(53.18% 0.28 296.97);
    --french-violet: oklch(47.66% 0.246 305.88);
    --vivid-pink: oklch(69.02% 0.277 332.77);
    --hot-red: oklch(61.42% 0.238 15.34);
    --orange-red: oklch(63.32% 0.24 31.68);

    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    --red-to-pink-to-purple-vertical-gradient: linear-gradient(
      180deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --red-to-pink-to-purple-horizontal-gradient: linear-gradient(
      90deg,
      var(--orange-red) 0%,
      var(--vivid-pink) 50%,
      var(--electric-violet) 100%
    );

    --pill-accent: var(--bright-blue);

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
  }
</style>

<main class="main">
  <div class="container">
    <div class="todo-root">
      <h1>{{ title() }}</h1>

      <div class="add-row">
        <input #newTodo type="text" placeholder="Add a task" aria-label="New task"
          (keydown.enter)="add(newTodo.value, newTodo)" />
        <button class="add-btn" (click)="add(newTodo.value, newTodo)">Add</button>
      </div>

      <ul class="todo-list">
        <li *ngFor="let t of todos()" [class.done]="t.done">
          <label class="task">
            <input type="checkbox" [checked]="t.done" (change)="toggle(t.id)" />
            <span class="text">{{ t.text }}</span>
          </label>
          <button class="delete" title="Remove" (click)="remove(t.id)">✕</button>
        </li>
      </ul>

      <div class="empty" *ngIf="todos().length === 0">No tasks yet — add one above.</div>
    </div>

    <app-selected-todos
      [todos]="todos()"
      (toggle)="toggle($event)"
      (remove)="remove($event)">
    </app-selected-todos>
  </div>
</main>
