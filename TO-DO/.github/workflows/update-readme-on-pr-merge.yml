name: Update README after PR merge

on:
  pull_request:
    branches:
      - develop
    types: [closed]

permissions:
  contents: write

jobs:
  update-readme:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get PR info
        run: |
          echo "PR_TITLE=${{ github.event.pull_request.title }}" >> $GITHUB_ENV
          echo "PR_BODY=${{ github.event.pull_request.body }}" >> $GITHUB_ENV

      - name: Update README
        run: |
          echo "## Latest Update from PR" >> README.md
          echo "- Title: $PR_TITLE" >> README.md
          echo "- Description: $PR_BODY" >> README.md
          echo "- Merged on: $(date)" >> README.md
          echo "" >> README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Auto update README from merged PR"
          git push
